<svg width="210" height="64" viewBox="0 0 210 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    MSS primary logo — dark-mode (white text for dark backgrounds).
    Same faceted M; lit facets use brighter lavender/indigo; shadow facets use mid-indigo
    so the mark stays legible against the dark app background.
  -->
  <defs>
    <linearGradient id="ld-lit-l" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="ld-sha-l" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%"  stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="ld-sha-r" x1="1" y1="0" x2="0.4" y2="1">
      <stop offset="0%"  stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="ld-lit-r" x1="1" y1="1" x2="0.7" y2="0">
      <stop offset="0%"  stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <path d="M 8 56 L 20 8 L 32 30 Z" fill="url(#ld-lit-l)"/>
  <path d="M 20 8 L 32 30 L 20 56 Z" fill="url(#ld-sha-l)"/>
  <path d="M 32 30 L 44 8 L 44 56 Z" fill="url(#ld-sha-r)"/>
  <path d="M 44 8 L 56 56 L 44 56 Z" fill="url(#ld-lit-r)"/>

  <!-- Wordmark -->
  <text x="76" y="42" font-family="'Inter','DM Sans','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#ffffff">MSS</text>
</svg>
