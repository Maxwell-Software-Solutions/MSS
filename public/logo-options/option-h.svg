<svg width="180" height="64" viewBox="0 0 180 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    OPTION H — Pure Wordmark (Stripe-style)
    No mark. Just a confident custom-weighted "MSS" with one subtle gradient accent.
    The gradient underscore reads as a cursor / baseline / horizon.
    Bold, minimal, premium. Lets the typography carry the brand.
  -->
  <defs>
    <linearGradient id="h-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Wordmark -->
  <text x="10" y="44" font-family="'Inter','DM Sans','Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="900" letter-spacing="-2" fill="#ffffff">MSS</text>

  <!-- Accent underbar — only under the first letter (signature element) -->
  <rect x="10" y="52" width="22" height="3.5" rx="1.75" fill="url(#h-accent)"/>
</svg>
