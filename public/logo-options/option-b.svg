<svg width="200" height="64" viewBox="0 0 200 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    OPTION B — Cornerstone
    Bold L-shaped bracket. Engineering precision, structural strength.
    Gradient stroke. Accent dot at the vertex.
    No subtext. Bold MSS wordmark.
  -->
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Vertical bar -->
  <rect x="8" y="8" width="8" height="46" rx="4" fill="url(#lg)"/>
  <!-- Horizontal bar -->
  <rect x="8" y="50" width="46" height="8" rx="4" fill="url(#lg)"/>
  <!-- Accent corner square -->
  <rect x="6" y="48" width="12" height="12" rx="3" fill="url(#dot)"/>

  <!-- Wordmark -->
  <text x="68" y="42" font-family="'Inter','DM Sans','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#ffffff">MSS</text>
</svg>
