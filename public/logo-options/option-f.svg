<svg width="210" height="64" viewBox="0 0 210 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    OPTION F — Maxwell Peak (solid faceted M)
    Bold geometric M built from 4 triangular facets like folded paper.
    Reads unambiguously as "M" at any scale. Gradient depth across facets.
    Distinctive silhouette, architectural, premium.
  -->
  <defs>
    <linearGradient id="f-g1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="f-g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="f-g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="f-g4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- 4 faceted triangles forming M. The outer peaks rise to y=8, the center valley to y=30, baseline y=56. -->
  <!-- Left outer: outer-baseline → left-peak → center-dip  -->
  <path d="M 8 56 L 20 8 L 32 34 Z" fill="url(#f-g1)"/>
  <!-- Left inner: left-peak → center-dip → outer-baseline (inside shadow side) -->
  <path d="M 20 8 L 32 34 L 20 56 Z" fill="url(#f-g2)"/>
  <!-- Right inner: center-dip → right-peak → inner-baseline -->
  <path d="M 32 34 L 44 8 L 44 56 Z" fill="url(#f-g3)"/>
  <!-- Right outer: right-peak → outer-baseline → inner -->
  <path d="M 44 8 L 56 56 L 44 56 Z" fill="url(#f-g4)"/>

  <!-- Wordmark -->
  <text x="76" y="42" font-family="'Inter','DM Sans','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#ffffff">MSS</text>
</svg>
