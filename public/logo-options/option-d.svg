<svg width="210" height="64" viewBox="0 0 210 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    OPTION D — Double Slash
    Two bold forward slashes — code comment syntax // .
    References engineering, forward momentum, cutting-edge.
    Left slash: violet. Right slash: indigo gradient.
    No subtext. Bold MSS wordmark.
  -->
  <defs>
    <linearGradient id="s1" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="s2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Left slash -->
  <line x1="10" y1="56" x2="26" y2="8" stroke="url(#s1)" stroke-width="7" stroke-linecap="round"/>
  <!-- Right slash -->
  <line x1="28" y1="56" x2="44" y2="8" stroke="url(#s2)" stroke-width="7" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="68" y="42" font-family="'Inter','DM Sans','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#ffffff">MSS</text>
</svg>
