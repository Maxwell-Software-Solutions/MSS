<svg width="360" height="80" viewBox="0 0 360 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    OPTION D — Double Slash
    Two bold forward slashes. References code (// comments),
    references momentum and forward motion.
    Brutally simple. Works at 16px and beyond.
    One navy, one blue — creates clear identity.
  -->

  <!-- Slash 1 — navy -->
  <line x1="18" y1="66" x2="32" y2="10" stroke="#0F172A" stroke-width="8" stroke-linecap="round"/>
  <!-- Slash 2 — blue, offset right -->
  <line x1="34" y1="66" x2="48" y2="10" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>

  <!-- Wordmark — full name, two weights -->
  <text x="70" y="36" font-family="'Inter', 'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.3" fill="#0F172A">Maxwell Software Solutions</text>
  <!-- Tagline / descriptor -->
  <text x="71" y="56" font-family="'Inter', 'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" letter-spacing="1.5" fill="#94A3B8">SOFTWARE ENGINEERING CONSULTANCY</text>
</svg>
