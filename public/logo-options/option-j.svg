<svg width="210" height="64" viewBox="0 0 210 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    OPTION J — Monolith (bold filled M in a rounded square)
    A confident monogram: solid rounded-square plate with a crisp M cut out in negative space.
    Reads as an app-icon mark. Scales beautifully. Distinctive silhouette.
    Subtle inner highlight for dimensional quality.
  -->
  <defs>
    <linearGradient id="j-plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="55%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="j-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Solid plate -->
  <rect x="6" y="6" width="52" height="52" rx="12" fill="url(#j-plate)"/>
  <!-- Top highlight for dimensional feel -->
  <rect x="6" y="6" width="52" height="52" rx="12" fill="url(#j-highlight)"/>

  <!-- Negative-space M -->
  <!-- Shape drawn clockwise so that the subtract fill-rule carves it from the plate above if composited,
       but we just use white fill here for visibility on the gradient plate. -->
  <path d="M 16 46 L 16 18 L 22 18 L 32 32 L 42 18 L 48 18 L 48 46 L 43 46 L 43 27 L 33 40 L 31 40 L 21 27 L 21 46 Z"
        fill="#ffffff" fill-rule="evenodd"/>

  <!-- Wordmark -->
  <text x="76" y="42" font-family="'Inter','DM Sans','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#ffffff">MSS</text>
</svg>
