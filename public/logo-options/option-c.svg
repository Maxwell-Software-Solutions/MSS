<svg width="200" height="64" viewBox="0 0 200 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    OPTION C — Gradient Diamond (evolution of the current logo)
    Outer diamond: gradient stroke. Inner diamond: gradient fill.
    Center dot anchors the mark. Gradient MSS wordmark.
    No subtext.
  -->
  <defs>
    <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Outer diamond: gradient stroke -->
  <rect x="13" y="13" width="38" height="38" rx="3"
    transform="rotate(45 32 32)"
    stroke="url(#dg)" stroke-width="3.5" fill="none"/>

  <!-- Inner diamond: gradient fill + stroke -->
  <rect x="21" y="21" width="22" height="22" rx="2"
    transform="rotate(45 32 32)"
    fill="url(#dg)" fill-opacity="0.22"
    stroke="url(#dg)" stroke-width="1.5"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="4.5" fill="url(#dg)"/>

  <!-- Wordmark — gradient text -->
  <text x="68" y="42" font-family="'Inter','DM Sans','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="url(#tg)">MSS</text>
</svg>
