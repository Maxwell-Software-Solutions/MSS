<svg width="210" height="64" viewBox="0 0 210 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    OPTION I — Maxwell Wave
    Single continuous stroke tracing an M silhouette as a waveform.
    References Maxwell's equations / electromagnetic waves / signal.
    One gesture, one gradient. Kinetic, technical, unique.
  -->
  <defs>
    <linearGradient id="i-wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="i-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Soft glow pass (underneath, blurred copy) -->
  <path d="M 8 50 Q 8 10 22 10 Q 32 10 32 34 Q 32 50 42 50 Q 52 50 52 10 Q 66 10 66 50"
        stroke="url(#i-wave)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"
        opacity="0.35" filter="url(#i-glow)"/>

  <!-- Main stroke M-wave: up / curve / down / dip / up / curve / down -->
  <path d="M 8 50 Q 8 10 22 10 Q 32 10 32 34 Q 32 50 42 50 Q 52 50 52 10 Q 66 10 66 50"
        stroke="url(#i-wave)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Baseline dot nodes -->
  <circle cx="8" cy="50" r="2.2" fill="#a78bfa"/>
  <circle cx="66" cy="50" r="2.2" fill="#60a5fa"/>

  <!-- Wordmark -->
  <text x="86" y="42" font-family="'Inter','DM Sans','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#ffffff">MSS</text>
</svg>
