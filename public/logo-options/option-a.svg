<svg width="210" height="64" viewBox="0 0 210 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    OPTION A — Signal Bars
    Three ascending bars: reads as growth, signal strength, momentum.
    Gradient across bars from muted → full violet → indigo.
    No subtext. Bold MSS wordmark.
  -->
  <defs>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Bar 1 — short, muted -->
  <rect x="6"  y="40" width="12" height="20" rx="3" fill="#818cf8" fill-opacity="0.35"/>
  <!-- Bar 2 — medium -->
  <rect x="22" y="24" width="12" height="36" rx="3" fill="#818cf8" fill-opacity="0.65"/>
  <!-- Bar 3 — tall, full gradient -->
  <rect x="38" y="8"  width="12" height="52" rx="3" fill="url(#barGrad)"/>

  <!-- Wordmark -->
  <text x="68" y="42" font-family="'Inter','DM Sans','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#ffffff">MSS</text>
</svg>
