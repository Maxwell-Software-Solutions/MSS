<svg width="360" height="80" viewBox="0 0 360 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    OPTION A — Signal Bars
    Three ascending bars. Reads as signal strength / upward growth.
    At 16px: clean abstract mark. At large: clear metaphor.
    Middle bar is accent blue — creates visual anchor.
  -->

  <!-- Bar 1 — short -->
  <rect x="8" y="44" width="10" height="22" rx="2" fill="#0F172A"/>
  <!-- Bar 2 — medium, accent -->
  <rect x="23" y="30" width="10" height="36" rx="2" fill="#2563EB"/>
  <!-- Bar 3 — tall -->
  <rect x="38" y="16" width="10" height="50" rx="2" fill="#0F172A"/>

  <!-- Wordmark -->
  <text x="70" y="36" font-family="'Inter', 'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="-0.6" fill="#0F172A">Maxwell Software</text>
  <text x="70" y="58" font-family="'Inter', 'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="300" letter-spacing="-0.6" fill="#2563EB">Solutions</text>
</svg>
