<svg width="300" height="60" viewBox="0 0 300 60" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Maxwell Software Solutions">
  <title>Maxwell Software Solutions</title>

  <!-- Hexagon icon mark -->
  <polygon points="30,4 52,16 52,44 30,56 8,44 8,16" fill="#1a2744" stroke="#3b82f6" stroke-width="2"/>

  <!-- Inner circuit / node lines -->
  <circle cx="30" cy="30" r="3.5" fill="#3b82f6"/>
  <circle cx="18" cy="22" r="2.2" fill="#3b82f6" fill-opacity="0.7"/>
  <circle cx="42" cy="22" r="2.2" fill="#3b82f6" fill-opacity="0.7"/>
  <circle cx="18" cy="38" r="2.2" fill="#3b82f6" fill-opacity="0.7"/>
  <circle cx="42" cy="38" r="2.2" fill="#3b82f6" fill-opacity="0.7"/>
  <line x1="18" y1="22" x2="30" y2="30" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.8"/>
  <line x1="42" y1="22" x2="30" y2="30" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.8"/>
  <line x1="18" y1="38" x2="30" y2="30" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.8"/>
  <line x1="42" y1="38" x2="30" y2="30" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.8"/>
  <line x1="18" y1="22" x2="18" y2="38" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="42" y1="22" x2="42" y2="38" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- MSS initials inside hexagon -->
  <text x="30" y="26" font-family="'Arial', sans-serif" font-size="7" font-weight="700" fill="#60a5fa" text-anchor="middle" letter-spacing="1">MSS</text>

  <!-- Vertical separator -->
  <line x1="66" y1="14" x2="66" y2="46" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Wordmark -->
  <text x="76" y="26" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="17" font-weight="700" fill="#1a2744" letter-spacing="0.3">Maxwell</text>
  <text x="76" y="43" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="11.5" font-weight="400" fill="#4b6a9c" letter-spacing="0.8">Software Solutions</text>
</svg>
