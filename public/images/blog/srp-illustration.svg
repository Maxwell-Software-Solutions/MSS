<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Single Responsibility Principle example</title>
  <desc>Comparison of a focused AuthService and an overloaded UserManager violating SRP.</desc>
  <defs>
    <linearGradient id="bgSrp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06080f"/>
      <stop offset="1" stop-color="#0c1325"/>
    </linearGradient>
    <pattern id="gridSrp" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#818cf8" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <linearGradient id="accentSrp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgSrp)"/>
  <rect width="400" height="300" fill="url(#gridSrp)"/>
  <rect width="400" height="3" fill="url(#accentSrp)"/>
  <text x="200" y="30" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="15" font-weight="700" fill="#f1f5f9">Single Responsibility</text>
  <g font-family="'Segoe UI',Arial" font-size="10" font-weight="500" text-anchor="middle">
    <g transform="translate(90 130)">
      <rect x="-70" y="-52" width="140" height="104" rx="14" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.4" stroke-width="1.5"/>
      <text y="-24" fill="#34d399" font-size="11" font-weight="700">AuthService</text>
      <text y="-4" fill="#94a3b8">+ login()</text>
      <text y="14" fill="#94a3b8">+ logout()</text>
      <text y="38" fill="#34d399" font-weight="700">Good ✓</text>
    </g>
    <g transform="translate(310 130)">
      <rect x="-70" y="-52" width="140" height="104" rx="14" fill="#f87171" fill-opacity="0.08" stroke="#f87171" stroke-opacity="0.4" stroke-width="1.5"/>
      <text y="-24" fill="#f87171" font-size="11" font-weight="700">UserManager</text>
      <text y="-4" fill="#94a3b8">+ login()</text>
      <text y="14" fill="#94a3b8">+ sendEmail()</text>
      <text y="38" fill="#f87171" font-weight="700">Bad ✗</text>
    </g>
  </g>
  <text x="200" y="228" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="11" fill="#94a3b8">One responsibility per module</text>
  <text x="200" y="246" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="11" fill="#64748b">Improves testability &amp; maintainability</text>
</svg>
