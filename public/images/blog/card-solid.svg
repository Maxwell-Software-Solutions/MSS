<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1325"/>
    </linearGradient>
    <radialGradient id="g1" cx="30%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="75%" cy="65%" r="45%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <rect width="600" height="450" fill="url(#g1)"/>
  <rect width="600" height="450" fill="url(#g2)"/>
  <rect width="600" height="3" fill="url(#accent)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="90" x2="600" y2="90"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="270" x2="600" y2="270"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
  </g>

  <!-- Five stacked/layered blocks - isometric style -->
  <!-- Shadow glow behind each block -->
  <rect x="52" y="158" width="92" height="200" rx="18" fill="#818cf8" fill-opacity="0.06"/>
  <rect x="162" y="128" width="92" height="230" rx="18" fill="#34d399" fill-opacity="0.06"/>
  <rect x="272" y="98" width="92" height="260" rx="18" fill="#fbbf24" fill-opacity="0.06"/>
  <rect x="382" y="128" width="92" height="230" rx="18" fill="#f87171" fill-opacity="0.06"/>
  <rect x="492" y="158" width="92" height="200" rx="18" fill="#a78bfa" fill-opacity="0.06"/>

  <!-- S block -->
  <rect x="52" y="160" width="92" height="198" rx="16" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="52" y="160" width="92" height="6" rx="3" fill="#818cf8"/>
  <text x="98" y="278" font-family="sans-serif" font-size="64" font-weight="900" fill="#818cf8" fill-opacity="0.35" text-anchor="middle">S</text>

  <!-- O block (taller) -->
  <rect x="162" y="130" width="92" height="228" rx="16" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="162" y="130" width="92" height="6" rx="3" fill="#34d399"/>
  <text x="208" y="278" font-family="sans-serif" font-size="64" font-weight="900" fill="#34d399" fill-opacity="0.35" text-anchor="middle">O</text>

  <!-- L block (tallest - center) -->
  <rect x="272" y="100" width="92" height="258" rx="16" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-opacity="0.45" stroke-width="2"/>
  <rect x="272" y="100" width="92" height="6" rx="3" fill="#fbbf24"/>
  <text x="318" y="278" font-family="sans-serif" font-size="64" font-weight="900" fill="#fbbf24" fill-opacity="0.35" text-anchor="middle">L</text>

  <!-- I block -->
  <rect x="382" y="130" width="92" height="228" rx="16" fill="#f87171" fill-opacity="0.1" stroke="#f87171" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="382" y="130" width="92" height="6" rx="3" fill="#f87171"/>
  <text x="428" y="278" font-family="sans-serif" font-size="64" font-weight="900" fill="#f87171" fill-opacity="0.35" text-anchor="middle">I</text>

  <!-- D block -->
  <rect x="458" y="160" width="92" height="198" rx="16" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="458" y="160" width="92" height="6" rx="3" fill="#a78bfa"/>
  <text x="504" y="278" font-family="sans-serif" font-size="64" font-weight="900" fill="#a78bfa" fill-opacity="0.35" text-anchor="middle">D</text>

  <!-- Shared base line -->
  <rect x="42" y="356" width="520" height="2" rx="1" fill="#ffffff" fill-opacity="0.06"/>

  <!-- Connecting dots -->
  <circle cx="150" cy="225" r="4" fill="#ffffff" fill-opacity="0.1"/>
  <circle cx="260" cy="225" r="4" fill="#ffffff" fill-opacity="0.1"/>
  <circle cx="370" cy="225" r="4" fill="#ffffff" fill-opacity="0.1"/>
  <circle cx="456" cy="225" r="4" fill="#ffffff" fill-opacity="0.1"/>
</svg>
