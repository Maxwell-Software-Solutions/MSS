<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Dependency Inversion Principle</title>
  <desc>High-level OrderService depends on IPayment abstraction, implemented by Stripe and PayPal.</desc>
  <defs>
    <linearGradient id="bgDip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06080f"/>
      <stop offset="1" stop-color="#0c1325"/>
    </linearGradient>
    <pattern id="gridDip" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#818cf8" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <linearGradient id="accentDip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <marker id="arrowDip" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#4f46e5"/>
    </marker>
  </defs>
  <rect width="400" height="300" fill="url(#bgDip)"/>
  <rect width="400" height="300" fill="url(#gridDip)"/>
  <rect width="400" height="3" fill="url(#accentDip)"/>
  <text x="200" y="30" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="15" font-weight="700" fill="#f1f5f9">Dependency Inversion</text>
  <g font-family="'Segoe UI',Arial" font-size="10" font-weight="500" text-anchor="middle">
    <g transform="translate(100 100)">
      <rect x="-66" y="-32" width="132" height="62" rx="14" fill="#818cf8" fill-opacity="0.1" stroke="#818cf8" stroke-opacity="0.4" stroke-width="1.5"/>
      <text y="-8" fill="#818cf8" font-weight="700">OrderService</text>
      <text y="12" fill="#94a3b8">+ placeOrder()</text>
    </g>
    <g transform="translate(300 100)">
      <rect x="-66" y="-32" width="132" height="62" rx="14" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
      <text y="-8" fill="#a78bfa" font-weight="700">IPayment</text>
      <text y="12" fill="#94a3b8">+ pay()</text>
    </g>
    <path d="M166 100H234" stroke="#4f46e5" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowDip)"/>
    <g transform="translate(245 215)">
      <rect x="-54" y="-30" width="108" height="58" rx="12" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.4" stroke-width="1.5"/>
      <text y="-4" fill="#34d399" font-weight="700">StripePay</text>
    </g>
    <g transform="translate(355 215)">
      <rect x="-54" y="-30" width="108" height="58" rx="12" fill="#fbbf24" fill-opacity="0.08" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="1.5"/>
      <text y="-4" fill="#fbbf24" font-weight="700">PayPalPay</text>
    </g>
    <path d="M300 132l-55 54" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M300 132l55 54" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="200" y="272" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="11" fill="#94a3b8">High-level modules depend on abstractions</text>
</svg>
