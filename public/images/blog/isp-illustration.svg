<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Interface Segregation Principle illustration</title>
  <desc>Fat IMachine interface contrasted with three focused interfaces following ISP.</desc>
  <defs>
    <linearGradient id="bgIsp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06080f"/>
      <stop offset="1" stop-color="#0c1325"/>
    </linearGradient>
    <pattern id="gridIsp" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#818cf8" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <linearGradient id="accentIsp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgIsp)"/>
  <rect width="400" height="300" fill="url(#gridIsp)"/>
  <rect width="400" height="3" fill="url(#accentIsp)"/>
  <text x="200" y="30" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="15" font-weight="700" fill="#f1f5f9">Interface Segregation</text>
  <g font-family="'Segoe UI',Arial" font-size="10" font-weight="500" text-anchor="middle">
    <g transform="translate(90 130)">
      <rect x="-70" y="-56" width="140" height="112" rx="14" fill="#f87171" fill-opacity="0.08" stroke="#f87171" stroke-opacity="0.4" stroke-width="1.5"/>
      <text y="-24" fill="#f87171" font-weight="700">IMachine</text>
      <text y="-4" fill="#94a3b8">print()</text>
      <text y="14" fill="#94a3b8">scan()</text>
      <text y="32" fill="#94a3b8">fax()</text>
      <text y="52" fill="#f87171" font-weight="700">Bad ✗</text>
    </g>
    <g transform="translate(300 110)" fill="#f1f5f9">
      <rect x="-60" y="-16" width="120" height="34" rx="10" fill="#818cf8" fill-opacity="0.1" stroke="#818cf8" stroke-opacity="0.4" stroke-width="1.5"/>
      <text y="8" fill="#818cf8" font-weight="700">IPrinter</text>
      <rect x="-60" y="26" width="120" height="34" rx="10" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.4" stroke-width="1.5"/>
      <text y="48" fill="#34d399" font-weight="700">IScanner</text>
      <rect x="-60" y="68" width="120" height="34" rx="10" fill="#fbbf24" fill-opacity="0.1" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="1.5"/>
      <text y="90" fill="#fbbf24" font-weight="700">IFax</text>
      <text y="122" fill="#34d399" font-weight="700">Good ✓</text>
    </g>
  </g>
  <text x="200" y="252" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="11" fill="#94a3b8">Clients depend only on what they use</text>
</svg>
