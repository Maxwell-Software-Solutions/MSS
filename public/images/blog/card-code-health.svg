<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1325"/>
    </linearGradient>
    <radialGradient id="g1" cx="28%" cy="38%" r="54%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="76%" cy="62%" r="45%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#34d399" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#34d399" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <rect width="600" height="450" fill="url(#g1)"/>
  <rect width="600" height="450" fill="url(#g2)"/>
  <rect width="600" height="3" fill="url(#accent)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="90" x2="600" y2="90"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="270" x2="600" y2="270"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
  </g>

  <!-- Circuit board traces (background) -->
  <g stroke="#818cf8" stroke-opacity="0.08" stroke-width="1.5" fill="none">
    <path d="M60 225 H 100 V 170 H 160"/>
    <path d="M160 170 H 200 V 130 H 240"/>
    <path d="M240 130 H 280"/>
    <path d="M60 225 V 300 H 120 V 340"/>
    <path d="M500 225 H 460 V 160 H 420"/>
    <path d="M500 225 V 300 H 450 V 340"/>
    <path d="M300 130 H 360 V 170 H 400 V 225 H 420"/>
  </g>
  <!-- Circuit nodes -->
  <circle cx="160" cy="170" r="4" fill="#818cf8" fill-opacity="0.2" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="240" cy="130" r="4" fill="#818cf8" fill-opacity="0.2" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="360" cy="170" r="4" fill="#818cf8" fill-opacity="0.2" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="120" cy="340" r="4" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="450" cy="340" r="4" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Heartbeat / pulse line -->
  <polyline
    points="40,225 100,225 130,225 150,150 170,300 190,225 230,225 260,225 280,170 300,280 320,225 360,225 380,225 400,180 420,270 440,225 560,225"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Glowing heartbeat highlight -->
  <polyline
    points="150,150 170,300 190,225"
    fill="none"
    stroke="#34d399"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />
  <polyline
    points="400,180 420,270 440,225"
    fill="none"
    stroke="#34d399"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.6"
  />

  <!-- Health score ring -->
  <circle cx="300" cy="225" r="55" fill="#34d399" fill-opacity="0.04" stroke="#34d399" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="300" cy="225" r="40" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Partial arc for score (roughly 85%) -->
  <path d="M300 185 A40 40 0 1 1 263 252" fill="none" stroke="#34d399" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round"/>
  <circle cx="300" cy="225" r="8" fill="#34d399" fill-opacity="0.5"/>
  <circle cx="300" cy="225" r="3" fill="#6ee7b7"/>

  <!-- Metric bars (top left area) -->
  <g transform="translate(55, 300)">
    <rect x="0" y="0" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.05"/>
    <rect x="0" y="0" width="96" height="8" rx="4" fill="#34d399" fill-opacity="0.5"/>
    <rect x="0" y="16" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.05"/>
    <rect x="0" y="16" width="72" height="8" rx="4" fill="#818cf8" fill-opacity="0.5"/>
    <rect x="0" y="32" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.05"/>
    <rect x="0" y="32" width="108" height="8" rx="4" fill="#34d399" fill-opacity="0.4"/>
  </g>

  <!-- Metric bars (top right area) -->
  <g transform="translate(425, 300)">
    <rect x="0" y="0" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.05"/>
    <rect x="0" y="0" width="60" height="8" rx="4" fill="#fbbf24" fill-opacity="0.4"/>
    <rect x="0" y="16" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.05"/>
    <rect x="0" y="16" width="102" height="8" rx="4" fill="#34d399" fill-opacity="0.45"/>
    <rect x="0" y="32" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.05"/>
    <rect x="0" y="32" width="84" height="8" rx="4" fill="#818cf8" fill-opacity="0.4"/>
  </g>
</svg>
