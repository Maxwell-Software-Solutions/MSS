<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1325"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4f46e5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Title area -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="180" height="28" rx="6" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="90" y="19" font-family="sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="3">DEVOPS</text>
    <text x="0" y="66" font-family="sans-serif" font-size="38" font-weight="800" fill="#f1f5f9">CI/CD Pipeline</text>
    <text x="0" y="100" font-family="sans-serif" font-size="38" font-weight="800" fill="#818cf8">Automation</text>
    <text x="0" y="136" font-family="sans-serif" font-size="15" fill="#94a3b8">Ship with confidence · Every. Single. Time.</text>
  </g>

  <!-- Pipeline stages - horizontal flow -->
  <g transform="translate(60, 280)">

    <!-- Connector line -->
    <line x1="100" y1="55" x2="1090" y2="55" stroke="#4f46e5" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="6,4"/>

    <!-- SOURCE -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="170" height="110" rx="14" fill="url(#cardGrad)" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
      <circle cx="85" cy="30" r="18" fill="#818cf8" fill-opacity="0.15"/>
      <text x="85" y="35" font-family="monospace" font-size="14" font-weight="700" fill="#818cf8" text-anchor="middle">&#x2771;</text>
      <text x="85" y="68" font-family="sans-serif" font-size="13" font-weight="700" fill="#f1f5f9" text-anchor="middle">Source</text>
      <text x="85" y="85" font-family="monospace" font-size="11" fill="#818cf8" text-anchor="middle">git push</text>
      <circle cx="145" cy="20" r="5" fill="#34d399"/>
    </g>
    <path d="M 178 55 L 208 55" stroke="#4f46e5" stroke-width="2" fill="none" marker-end="url(#arr)"/>

    <!-- BUILD -->
    <g transform="translate(216, 0)">
      <rect x="0" y="0" width="170" height="110" rx="14" fill="url(#cardGrad)" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
      <circle cx="85" cy="30" r="18" fill="#7c3aed" fill-opacity="0.2"/>
      <text x="85" y="35" font-family="monospace" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">&#x2699;</text>
      <text x="85" y="68" font-family="sans-serif" font-size="13" font-weight="700" fill="#f1f5f9" text-anchor="middle">Build</text>
      <text x="85" y="85" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">compile · lint</text>
      <circle cx="145" cy="20" r="5" fill="#34d399"/>
    </g>
    <path d="M 394 55 L 424 55" stroke="#4f46e5" stroke-width="2" fill="none" marker-end="url(#arr)"/>

    <!-- TEST -->
    <g transform="translate(432, 0)">
      <rect x="0" y="0" width="170" height="110" rx="14" fill="url(#cardGrad)" stroke="#34d399" stroke-opacity="0.25" stroke-width="1"/>
      <circle cx="85" cy="30" r="18" fill="#34d399" fill-opacity="0.12"/>
      <text x="85" y="35" font-family="monospace" font-size="14" font-weight="700" fill="#34d399" text-anchor="middle">&#x2714;</text>
      <text x="85" y="68" font-family="sans-serif" font-size="13" font-weight="700" fill="#f1f5f9" text-anchor="middle">Test</text>
      <text x="85" y="85" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">unit · e2e</text>
      <circle cx="145" cy="20" r="5" fill="#34d399"/>
    </g>
    <path d="M 610 55 L 640 55" stroke="#4f46e5" stroke-width="2" fill="none" marker-end="url(#arr)"/>

    <!-- SECURITY -->
    <g transform="translate(648, 0)">
      <rect x="0" y="0" width="170" height="110" rx="14" fill="url(#cardGrad)" stroke="#fbbf24" stroke-opacity="0.25" stroke-width="1"/>
      <circle cx="85" cy="30" r="18" fill="#fbbf24" fill-opacity="0.12"/>
      <text x="85" y="36" font-family="monospace" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="middle">&#x26A0;</text>
      <text x="85" y="68" font-family="sans-serif" font-size="13" font-weight="700" fill="#f1f5f9" text-anchor="middle">Security</text>
      <text x="85" y="85" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">SAST · scan</text>
      <circle cx="145" cy="20" r="5" fill="#34d399"/>
    </g>
    <path d="M 826 55 L 856 55" stroke="#4f46e5" stroke-width="2" fill="none" marker-end="url(#arr)"/>

    <!-- DEPLOY -->
    <g transform="translate(864, 0)">
      <rect x="0" y="0" width="170" height="110" rx="14" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.3" stroke-width="1"/>
      <circle cx="85" cy="30" r="18" fill="#34d399" fill-opacity="0.15"/>
      <text x="85" y="36" font-family="monospace" font-size="15" font-weight="700" fill="#34d399" text-anchor="middle">&#x25B6;</text>
      <text x="85" y="68" font-family="sans-serif" font-size="13" font-weight="700" fill="#f1f5f9" text-anchor="middle">Deploy</text>
      <text x="85" y="85" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">production</text>
      <circle cx="145" cy="20" r="5" fill="#34d399"/>
    </g>
  </g>

  <!-- Stats row -->
  <g transform="translate(60, 450)">
    <rect x="0" y="0" width="180" height="60" rx="10" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="20" y="26" font-family="sans-serif" font-size="22" font-weight="800" fill="#34d399">99.8%</text>
    <text x="20" y="46" font-family="sans-serif" font-size="12" fill="#94a3b8">Deployment success</text>

    <rect x="210" y="0" width="180" height="60" rx="10" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="230" y="26" font-family="sans-serif" font-size="22" font-weight="800" fill="#818cf8">4 min</text>
    <text x="230" y="46" font-family="sans-serif" font-size="12" fill="#94a3b8">Avg pipeline time</text>

    <rect x="420" y="0" width="180" height="60" rx="10" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="440" y="26" font-family="sans-serif" font-size="22" font-weight="800" fill="#fbbf24">12×</text>
    <text x="440" y="46" font-family="sans-serif" font-size="12" fill="#94a3b8">Daily deploys</text>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Bottom label -->
  <text x="600" y="596" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="2">MAXWELL SOFTWARE SOLUTIONS</text>
</svg>
