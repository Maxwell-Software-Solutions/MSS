<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1325"/>
    </linearGradient>
    <radialGradient id="g1" cx="25%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="78%" cy="60%" r="44%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4f46e5"/>
    </marker>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <rect width="600" height="450" fill="url(#g1)"/>
  <rect width="600" height="450" fill="url(#g2)"/>
  <rect width="600" height="3" fill="url(#accent)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="90" x2="600" y2="90"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="270" x2="600" y2="270"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
  </g>

  <!-- LEFT: messy/tangled block shape -->
  <g transform="translate(55, 110)">
    <!-- Chaotic nested rectangles -->
    <rect x="0" y="0" width="185" height="230" rx="12" fill="#f87171" fill-opacity="0.06" stroke="#f87171" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="6,4"/>
    <!-- Messy inner shapes -->
    <rect x="14" y="18" width="100" height="28" rx="6" fill="#f87171" fill-opacity="0.12"/>
    <rect x="14" y="54" width="140" height="20" rx="6" fill="#f87171" fill-opacity="0.08"/>
    <rect x="30" y="82" width="80" height="16" rx="6" fill="#f87171" fill-opacity="0.1"/>
    <rect x="14" y="106" width="120" height="16" rx="6" fill="#f87171" fill-opacity="0.07"/>
    <rect x="30" y="130" width="60" height="16" rx="6" fill="#f87171" fill-opacity="0.1"/>
    <rect x="14" y="154" width="100" height="16" rx="6" fill="#f87171" fill-opacity="0.07"/>
    <rect x="50" y="178" width="80" height="16" rx="6" fill="#f87171" fill-opacity="0.08"/>
    <!-- Tangled lines -->
    <path d="M14 42 Q80 60 14 76" stroke="#f87171" stroke-opacity="0.2" stroke-width="1" fill="none"/>
    <path d="M120 54 Q90 90 140 106" stroke="#f87171" stroke-opacity="0.15" stroke-width="1" fill="none"/>
    <!-- Warning indicator -->
    <circle cx="160" cy="20" r="10" fill="#f87171" fill-opacity="0.2" stroke="#f87171" stroke-opacity="0.4" stroke-width="1"/>
    <text x="160" y="25" font-family="sans-serif" font-size="12" fill="#f87171" fill-opacity="0.7" text-anchor="middle">!</text>
  </g>

  <!-- Arrow in middle -->
  <g transform="translate(275, 220)">
    <circle cx="0" cy="0" r="22" fill="#4f46e5" fill-opacity="0.15" stroke="#4f46e5" stroke-opacity="0.3" stroke-width="1"/>
    <path d="M -8 0 L 6 0" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arr)"/>
    <path d="M -10 -6 L -16 0 L -10 6" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
  </g>

  <!-- RIGHT: clean/organized block shape -->
  <g transform="translate(360, 110)">
    <rect x="0" y="0" width="185" height="230" rx="12" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- Clean, ordered structure -->
    <rect x="14" y="18" width="157" height="28" rx="6" fill="#34d399" fill-opacity="0.15"/>
    <rect x="14" y="54" width="90" height="18" rx="6" fill="#818cf8" fill-opacity="0.12"/>
    <rect x="112" y="54" width="59" height="18" rx="6" fill="#818cf8" fill-opacity="0.08"/>
    <rect x="24" y="80" width="70" height="14" rx="4" fill="#34d399" fill-opacity="0.1"/>
    <rect x="24" y="100" width="55" height="14" rx="4" fill="#34d399" fill-opacity="0.08"/>
    <rect x="14" y="124" width="157" height="18" rx="6" fill="#818cf8" fill-opacity="0.1"/>
    <rect x="24" y="150" width="60" height="14" rx="4" fill="#fbbf24" fill-opacity="0.1"/>
    <rect x="24" y="170" width="45" height="14" rx="4" fill="#fbbf24" fill-opacity="0.08"/>
    <rect x="14" y="194" width="100" height="18" rx="6" fill="#34d399" fill-opacity="0.1"/>
    <!-- Check indicator -->
    <circle cx="160" cy="20" r="10" fill="#34d399" fill-opacity="0.2" stroke="#34d399" stroke-opacity="0.5" stroke-width="1"/>
    <path d="M155 20 L158 23 L165 17" stroke="#34d399" stroke-opacity="0.8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
