<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1325"/>
    </linearGradient>
    <radialGradient id="glow1" cx="28%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="76%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="barPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Title -->
  <g transform="translate(60, 68)">
    <rect x="0" y="0" width="190" height="28" rx="6" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="95" y="19" font-family="sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="3">ROI &amp; IMPACT</text>
    <text x="0" y="64" font-family="sans-serif" font-size="38" font-weight="800" fill="#f1f5f9">TDD Business</text>
    <text x="0" y="100" font-family="sans-serif" font-size="38" font-weight="800" fill="#818cf8">Value</text>
    <text x="0" y="134" font-family="sans-serif" font-size="15" fill="#94a3b8">The ROI of writing tests first</text>
  </g>

  <!-- Bar chart -->
  <g transform="translate(440, 150)">
    <!-- Chart frame -->
    <rect x="0" y="0" width="700" height="380" rx="16" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06"/>

    <!-- Y axis label -->
    <text x="20" y="32" font-family="sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">Impact Metrics</text>
    <text x="620" y="32" font-family="monospace" font-size="11" fill="#64748b" text-anchor="end">Without TDD vs With TDD</text>

    <!-- Horizontal grid lines -->
    <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
      <line x1="80" y1="60" x2="680" y2="60"/>
      <line x1="80" y1="110" x2="680" y2="110"/>
      <line x1="80" y1="160" x2="680" y2="160"/>
      <line x1="80" y1="210" x2="680" y2="210"/>
      <line x1="80" y1="260" x2="680" y2="260"/>
      <line x1="80" y1="310" x2="680" y2="310"/>
    </g>

    <!-- Metric: Bug Rate -->
    <text x="76" y="86" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">Bug Rate</text>
    <rect x="80" y="68" width="400" height="22" rx="4" fill="#f87171" fill-opacity="0.25"/>
    <text x="490" y="84" font-family="monospace" font-size="11" fill="#f87171">High — without TDD</text>
    <rect x="80" y="94" width="120" height="22" rx="4" fill="url(#barGreen)"/>
    <text x="210" y="110" font-family="monospace" font-size="11" fill="#34d399">−70% with TDD</text>

    <!-- Metric: Debug Time -->
    <text x="76" y="136" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">Debug Time</text>
    <rect x="80" y="118" width="500" height="22" rx="4" fill="#f87171" fill-opacity="0.25"/>
    <text x="590" y="134" font-family="monospace" font-size="11" fill="#f87171">High — without TDD</text>
    <rect x="80" y="144" width="175" height="22" rx="4" fill="url(#barGreen)"/>
    <text x="265" y="160" font-family="monospace" font-size="11" fill="#34d399">−65% with TDD</text>

    <!-- Metric: Deploy Confidence -->
    <text x="76" y="186" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">Deploy Conf.</text>
    <rect x="80" y="168" width="180" height="22" rx="4" fill="#f87171" fill-opacity="0.25"/>
    <text x="270" y="184" font-family="monospace" font-size="11" fill="#64748b">Low</text>
    <rect x="80" y="194" width="540" height="22" rx="4" fill="url(#barPurple)"/>
    <text x="630" y="210" font-family="monospace" font-size="11" fill="#818cf8">+90%</text>

    <!-- Metric: Feature Velocity -->
    <text x="76" y="236" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">Velocity</text>
    <rect x="80" y="218" width="220" height="22" rx="4" fill="#f87171" fill-opacity="0.25"/>
    <text x="310" y="234" font-family="monospace" font-size="11" fill="#64748b">Slow</text>
    <rect x="80" y="244" width="480" height="22" rx="4" fill="url(#barPurple)"/>
    <text x="570" y="260" font-family="monospace" font-size="11" fill="#818cf8">+2.4× faster</text>

    <!-- Metric: Refactor Safety -->
    <text x="76" y="286" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">Refactor Safety</text>
    <rect x="80" y="268" width="100" height="22" rx="4" fill="#f87171" fill-opacity="0.25"/>
    <text x="190" y="284" font-family="monospace" font-size="11" fill="#64748b">Risky</text>
    <rect x="80" y="294" width="560" height="22" rx="4" fill="url(#barGreen)"/>
    <text x="650" y="310" font-family="monospace" font-size="11" fill="#34d399">Safe</text>

    <!-- Legend -->
    <rect x="80" y="338" width="14" height="14" rx="3" fill="#f87171" fill-opacity="0.4"/>
    <text x="100" y="350" font-family="sans-serif" font-size="11" fill="#94a3b8">Without TDD</text>
    <rect x="210" y="338" width="14" height="14" rx="3" fill="#818cf8"/>
    <text x="230" y="350" font-family="sans-serif" font-size="11" fill="#94a3b8">With TDD (Purple metrics)</text>
    <rect x="430" y="338" width="14" height="14" rx="3" fill="#34d399"/>
    <text x="450" y="350" font-family="sans-serif" font-size="11" fill="#94a3b8">With TDD (Green metrics)</text>
  </g>

  <!-- Stat pills on left -->
  <g transform="translate(60, 195)">
    <rect x="0" y="0" width="340" height="70" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="24" y="30" font-family="sans-serif" font-size="26" font-weight="800" fill="#34d399">40–80%</text>
    <text x="24" y="52" font-family="sans-serif" font-size="12" fill="#94a3b8">Fewer defects in production</text>

    <rect x="0" y="90" width="340" height="70" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="24" y="120" font-family="sans-serif" font-size="26" font-weight="800" fill="#818cf8">15–35%</text>
    <text x="24" y="142" font-family="sans-serif" font-size="12" fill="#94a3b8">Increase in development speed</text>

    <rect x="0" y="180" width="340" height="70" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="24" y="210" font-family="sans-serif" font-size="26" font-weight="800" fill="#fbbf24">$15k+</text>
    <text x="24" y="232" font-family="sans-serif" font-size="12" fill="#94a3b8">Saved per critical bug prevented</text>

    <rect x="0" y="270" width="340" height="70" rx="12" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="24" y="300" font-family="sans-serif" font-size="26" font-weight="800" fill="#a78bfa">ROI</text>
    <text x="24" y="322" font-family="sans-serif" font-size="12" fill="#94a3b8">Proven across 1000+ teams (IBM, Microsoft)</text>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Bottom label -->
  <text x="600" y="596" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="2">MAXWELL SOFTWARE SOLUTIONS</text>
</svg>
