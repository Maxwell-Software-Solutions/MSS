<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1325"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="72%" cy="62%" r="40%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Title -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="210" height="28" rx="6" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="105" y="19" font-family="sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="3">ARCHITECTURE</text>
    <text x="0" y="66" font-family="sans-serif" font-size="38" font-weight="800" fill="#f1f5f9">Microservices</text>
    <text x="0" y="100" font-family="sans-serif" font-size="38" font-weight="800" fill="#818cf8">Architecture</text>
    <text x="0" y="134" font-family="sans-serif" font-size="15" fill="#94a3b8">Scalable · Independent · Resilient</text>
  </g>

  <!-- Connection lines (behind services) -->
  <g stroke="#4f46e5" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="5,4" fill="none">
    <!-- API Gateway to services -->
    <line x1="940" y1="290" x2="760" y2="210"/>
    <line x1="940" y1="290" x2="760" y2="305"/>
    <line x1="940" y1="290" x2="760" y2="400"/>
    <line x1="940" y1="290" x2="510" y2="210"/>
    <line x1="940" y1="290" x2="510" y2="305"/>
    <line x1="940" y1="290" x2="510" y2="400"/>
  </g>

  <!-- Service cards - 2 columns -->
  <!-- Left column -->
  <g transform="translate(380, 175)">
    <!-- Auth Service -->
    <rect x="0" y="0" width="150" height="80" rx="12" fill="url(#cardGrad)" stroke="#818cf8" stroke-opacity="0.25" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="80" rx="2" fill="#818cf8"/>
    <text x="20" y="28" font-family="monospace" font-size="12" font-weight="700" fill="#818cf8">Auth</text>
    <text x="20" y="44" font-family="sans-serif" font-size="11" fill="#94a3b8">Service</text>
    <text x="20" y="60" font-family="monospace" font-size="10" fill="#64748b">:3001</text>
    <circle cx="130" cy="15" r="5" fill="#34d399"/>

    <!-- User Service -->
    <rect x="0" y="100" width="150" height="80" rx="12" fill="url(#cardGrad)" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="1"/>
    <rect x="0" y="100" width="4" height="80" rx="2" fill="#a78bfa"/>
    <text x="20" y="128" font-family="monospace" font-size="12" font-weight="700" fill="#a78bfa">User</text>
    <text x="20" y="144" font-family="sans-serif" font-size="11" fill="#94a3b8">Service</text>
    <text x="20" y="160" font-family="monospace" font-size="10" fill="#64748b">:3002</text>
    <circle cx="130" cy="115" r="5" fill="#34d399"/>

    <!-- Payment Service -->
    <rect x="0" y="200" width="150" height="80" rx="12" fill="url(#cardGrad)" stroke="#fbbf24" stroke-opacity="0.25" stroke-width="1"/>
    <rect x="0" y="200" width="4" height="80" rx="2" fill="#fbbf24"/>
    <text x="20" y="228" font-family="monospace" font-size="12" font-weight="700" fill="#fbbf24">Payment</text>
    <text x="20" y="244" font-family="sans-serif" font-size="11" fill="#94a3b8">Service</text>
    <text x="20" y="260" font-family="monospace" font-size="10" fill="#64748b">:3003</text>
    <circle cx="130" cy="215" r="5" fill="#34d399"/>
  </g>

  <!-- Right column -->
  <g transform="translate(630, 175)">
    <!-- Order Service -->
    <rect x="0" y="0" width="150" height="80" rx="12" fill="url(#cardGrad)" stroke="#34d399" stroke-opacity="0.25" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="80" rx="2" fill="#34d399"/>
    <text x="20" y="28" font-family="monospace" font-size="12" font-weight="700" fill="#34d399">Order</text>
    <text x="20" y="44" font-family="sans-serif" font-size="11" fill="#94a3b8">Service</text>
    <text x="20" y="60" font-family="monospace" font-size="10" fill="#64748b">:3004</text>
    <circle cx="130" cy="15" r="5" fill="#34d399"/>

    <!-- Notification Service -->
    <rect x="0" y="100" width="150" height="80" rx="12" fill="url(#cardGrad)" stroke="#f87171" stroke-opacity="0.25" stroke-width="1"/>
    <rect x="0" y="100" width="4" height="80" rx="2" fill="#f87171"/>
    <text x="20" y="128" font-family="monospace" font-size="12" font-weight="700" fill="#f87171">Notify</text>
    <text x="20" y="144" font-family="sans-serif" font-size="11" fill="#94a3b8">Service</text>
    <text x="20" y="160" font-family="monospace" font-size="10" fill="#64748b">:3005</text>
    <circle cx="130" cy="115" r="5" fill="#34d399"/>

    <!-- Analytics Service -->
    <rect x="0" y="200" width="150" height="80" rx="12" fill="url(#cardGrad)" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="1"/>
    <rect x="0" y="200" width="4" height="80" rx="2" fill="#06b6d4"/>
    <text x="20" y="228" font-family="monospace" font-size="12" font-weight="700" fill="#06b6d4">Analytics</text>
    <text x="20" y="244" font-family="sans-serif" font-size="11" fill="#94a3b8">Service</text>
    <text x="20" y="260" font-family="monospace" font-size="10" fill="#64748b">:3006</text>
    <circle cx="130" cy="215" r="5" fill="#34d399"/>
  </g>

  <!-- API Gateway -->
  <g transform="translate(840, 250)">
    <rect x="0" y="0" width="160" height="80" rx="14" fill="url(#gatewayGrad)" stroke="#818cf8" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="80" y="32" font-family="sans-serif" font-size="13" font-weight="700" fill="#f1f5f9" text-anchor="middle">API</text>
    <text x="80" y="52" font-family="sans-serif" font-size="13" font-weight="700" fill="#a78bfa" text-anchor="middle">Gateway</text>
    <text x="80" y="68" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">:443</text>
  </g>

  <!-- Message Bus -->
  <g transform="translate(380, 500)">
    <rect x="0" y="0" width="440" height="50" rx="10" fill="url(#cardGrad)" stroke="#4f46e5" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="220" y="21" font-family="sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">Message Bus / Event Queue</text>
    <text x="220" y="38" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">Kafka · RabbitMQ · Redis Pub/Sub</text>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Bottom label -->
  <text x="600" y="596" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="2">MAXWELL SOFTWARE SOLUTIONS</text>
</svg>
