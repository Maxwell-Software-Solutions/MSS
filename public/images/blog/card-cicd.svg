<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1325"/>
    </linearGradient>
    <radialGradient id="g1" cx="20%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="82%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <rect width="600" height="450" fill="url(#g1)"/>
  <rect width="600" height="450" fill="url(#g2)"/>
  <rect width="600" height="3" fill="url(#accent)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="90" x2="600" y2="90"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="270" x2="600" y2="270"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
  </g>

  <!-- Pipeline track (tube) -->
  <rect x="50" y="208" width="500" height="34" rx="17" fill="#ffffff" fill-opacity="0.03" stroke="#4f46e5" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Flow fill -->
  <rect x="50" y="208" width="500" height="34" rx="17" fill="url(#pipe)" fill-opacity="0.08"/>

  <!-- Stage nodes on pipeline -->
  <!-- Source -->
  <circle cx="100" cy="225" r="28" fill="#818cf8" fill-opacity="0.18" stroke="#818cf8" stroke-opacity="0.6" stroke-width="2"/>
  <circle cx="100" cy="225" r="12" fill="#818cf8" fill-opacity="0.4"/>
  <circle cx="100" cy="225" r="5" fill="#a78bfa"/>

  <!-- Build -->
  <circle cx="210" cy="225" r="28" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="210" cy="225" r="12" fill="#a78bfa" fill-opacity="0.35"/>
  <circle cx="210" cy="225" r="5" fill="#c4b5fd"/>

  <!-- Test -->
  <circle cx="320" cy="225" r="28" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="320" cy="225" r="12" fill="#fbbf24" fill-opacity="0.3"/>
  <circle cx="320" cy="225" r="5" fill="#fbbf24"/>

  <!-- Security -->
  <circle cx="430" cy="225" r="28" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="430" cy="225" r="12" fill="#34d399" fill-opacity="0.3"/>
  <circle cx="430" cy="225" r="5" fill="#34d399"/>

  <!-- Deploy -->
  <circle cx="540" cy="225" r="30" fill="#34d399" fill-opacity="0.2" stroke="#34d399" stroke-opacity="0.7" stroke-width="2.5"/>
  <circle cx="540" cy="225" r="14" fill="#34d399" fill-opacity="0.4"/>
  <circle cx="540" cy="225" r="6" fill="#6ee7b7"/>

  <!-- Moving packet dots on track -->
  <circle cx="155" cy="225" r="5" fill="#818cf8" fill-opacity="0.7"/>
  <circle cx="168" cy="225" r="3.5" fill="#818cf8" fill-opacity="0.4"/>
  <circle cx="178" cy="225" r="2.5" fill="#818cf8" fill-opacity="0.2"/>

  <circle cx="265" cy="225" r="5" fill="#fbbf24" fill-opacity="0.7"/>
  <circle cx="278" cy="225" r="3.5" fill="#fbbf24" fill-opacity="0.4"/>

  <!-- Stage labels (minimal) -->
  <text x="100" y="275" font-family="monospace" font-size="9" fill="#818cf8" fill-opacity="0.6" text-anchor="middle">source</text>
  <text x="210" y="275" font-family="monospace" font-size="9" fill="#a78bfa" fill-opacity="0.6" text-anchor="middle">build</text>
  <text x="320" y="275" font-family="monospace" font-size="9" fill="#fbbf24" fill-opacity="0.6" text-anchor="middle">test</text>
  <text x="430" y="275" font-family="monospace" font-size="9" fill="#34d399" fill-opacity="0.6" text-anchor="middle">scan</text>
  <text x="540" y="275" font-family="monospace" font-size="9" fill="#34d399" fill-opacity="0.6" text-anchor="middle">deploy</text>

  <!-- Top decorative commit lines -->
  <g transform="translate(60, 100)" opacity="0.5">
    <rect x="0" y="0" width="200" height="12" rx="6" fill="#818cf8" fill-opacity="0.1" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="10" cy="6" r="4" fill="#818cf8" fill-opacity="0.5"/>
    <rect x="24" y="3" width="80" height="6" rx="3" fill="#818cf8" fill-opacity="0.2"/>
    <rect x="112" y="3" width="40" height="6" rx="3" fill="#4f46e5" fill-opacity="0.3"/>
  </g>
  <g transform="translate(60, 122)" opacity="0.3">
    <rect x="0" y="0" width="160" height="12" rx="6" fill="#818cf8" fill-opacity="0.08" stroke="#818cf8" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="10" cy="6" r="4" fill="#a78bfa" fill-opacity="0.4"/>
    <rect x="24" y="3" width="60" height="6" rx="3" fill="#818cf8" fill-opacity="0.15"/>
  </g>
  <g transform="translate(60, 144)" opacity="0.15">
    <rect x="0" y="0" width="120" height="12" rx="6" fill="#818cf8" fill-opacity="0.06" stroke="#818cf8" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="10" cy="6" r="4" fill="#818cf8" fill-opacity="0.3"/>
  </g>

  <!-- Bottom success glow -->
  <circle cx="540" cy="225" r="50" fill="#34d399" fill-opacity="0.04"/>
  <circle cx="540" cy="225" r="70" fill="#34d399" fill-opacity="0.02"/>
</svg>
